server {
    listen 80;
    
    resolver 169.254.169.253 valid=10s;
    
    location = /health.html {
        root   /usr/share/nginx/html;
        access_log off;
    }

   # Backend API proxy
    location /auth/ {
        proxy_pass http://enutritrack-microservices-1357728765.us-east-1.elb.amazonaws.com/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /users/ {
        proxy_pass http://enutritrack-microservices-1357728765.us-east-1.elb.amazonaws.com/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /nutrition/ {
        proxy_pass http://enutritrack-microservices-1357728765.us-east-1.elb.amazonaws.com/nutrition/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /physical-activity/ {
        proxy_pass http://enutritrack-microservices-1357728765.us-east-1.elb.amazonaws.com/physical-activity/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /citas-medicas/ {
        proxy_pass http://enutritrack-microservices-1357728765.us-east-1.elb.amazonaws.com/citas-medicas/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /recommendations/ {
        proxy_pass http://enutritrack-microservices-1357728765.us-east-1.elb.amazonaws.com/recommendations/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /medical-history/ {
        proxy_pass http://enutritrack-microservices-1357728765.us-east-1.elb.amazonaws.com/medical-history/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /doctors/ {
        proxy_pass http://enutritrack-microservices-1357728765.us-east-1.elb.amazonaws.com/doctors/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /alerts/ {
        proxy_pass http://enutritrack-microservices-1357728765.us-east-1.elb.amazonaws.com/alerts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}